# Prometheus / Grafana — без PVC (emptyDir). Только Alertmanager — PVC на nfs-client.
prometheus:
  server:
    persistentVolume:
      enabled: false
    service:
      type: ClusterIP
  # Subchart alertmanager: только persistence.* (persistentVolume игнорируется → PVC без storageClass).
  alertmanager:
    persistence:
      enabled: true
      storageClass: nfs-client
      size: 2Gi

grafana:
  adminUser: admin
  adminPassword: "Mypass2D"
  persistence:
    enabled: false
  service:
    type: ClusterIP

hostOctet: 3
gatewayPort: 80