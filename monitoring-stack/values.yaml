# Без PVC: данные в emptyDir — при удалении пода теряются (для dev/учебы ок).
prometheus:
  server:
    persistentVolume:
      enabled: false
    service:
      type: ClusterIP
  # В subchart alertmanager ключ — persistence, НЕ persistentVolume (иначе игнорируется).
  alertmanager:
    persistence:
      enabled: false

grafana:
  adminUser: admin
  adminPassword: "Mypass2D"
  persistence:
    enabled: false
  service:
    type: ClusterIP

# Istio host routing settings (same style as previous chart)
hostOctet: 3
gatewayPort: 80
