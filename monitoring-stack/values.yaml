prometheus:
  # NFS dynamic provisioner (kubectl get storageclass nfs-client)
  server:
    persistentVolume:
      enabled: true
      storageClass: nfs-client
      size: 8Gi
    service:
      type: ClusterIP
  alertmanager:
    persistentVolume:
      enabled: false

grafana:
  adminUser: admin
  adminPassword: "Mypass2D"
  persistence:
    enabled: true
    storageClassName: nfs-client
    size: 2Gi
  service:
    type: ClusterIP

# Istio host routing settings (same style as previous chart)
hostOctet: 3
gatewayPort: 80